[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "W",    # pycodestyle warnings
    "B",    # flake8-bugbear (common bugs/design problems)
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "UP",   # pyupgrade (modernize syntax)
    "S",    # bandit (security issues)
    "RET",  # flake8-return
    "PIE",  # flake8-pie (misc linting)
    "T20",  # flake8-print (no print in production)
    "DJ",   # flake8-django
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "DJ001",  # nullable CharField (tech debt, requires migration)
]

[tool.ruff.lint.per-file-ignores]
"*/migrations/*" = ["ALL"]
"config/settings.py" = ["S105"]
"manage.py" = ["T20"]

[tool.ruff.format]
quote-style = "single"

[tool.coverage.run]
source = ["apps"]
branch = true
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/tests.py",
    "manage.py",
    "config/asgi.py",
    "config/wsgi.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
]
